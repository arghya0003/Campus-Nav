services:
  - type: web
    name: campusnav-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3001
      - key: GOOGLE_MAPS_API_KEY
        sync: false   # You will set this manually in the Render dashboard
      - key: ALLOWED_ORIGIN
        sync: false   # Set this to your Vercel URL, e.g. https://campusnav.vercel.app
